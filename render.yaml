services:
  - type: web
    name: eaglevision
    runtime: node
    buildCommand: |
      pip install torch torchvision lightgbm scikit-learn scipy numpy opencv-python-headless pillow flask joblib pandas ultralytics &&
      cd client && npm install && npm run build &&
      cd ../server && npm install && npx prisma generate
    startCommand: cd server && node server.js
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: PYTHON_PATH
        value: python3
      - key: DATABASE_URL
        fromDatabase:
          name: eaglevision-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000

databases:
  - name: eaglevision-db
    plan: free
